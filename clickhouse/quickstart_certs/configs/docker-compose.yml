version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: nginx-clickhouse
    network_mode: "host"
    volumes:
      - ./conf.d:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./nginx-logs:/var/log/nginx
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:8123/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

# Tùy chọn: Thêm network riêng nếu không dùng host network mode
# Optional: Add custom network if not using host mode
# networks:
#   clickhouse-network:
#     external: true
