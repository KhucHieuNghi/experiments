# Nginx Configuration for ClickHouse HTTPS Proxy
# Cấu hình Nginx proxy HTTPS cho ClickHouse

upstream clickhouse_backend {
    server 127.0.0.1:8123;
    keepalive 32;
}

server {
    listen 8443 ssl;
    listen [::]:8443 ssl;
    server_name ch.domain.com;

    # SSL Configuration - Let's Encrypt
    # Cấu hình SSL - Let's Encrypt
    ssl_certificate /etc/letsencrypt/live/ch.domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ch.domain.com/privkey.pem;

    # Modern SSL configuration
    # Cấu hình SSL hiện đại
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Security headers
    # Header bảo mật
    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ClickHouse ping endpoint
    location /ping {
        proxy_pass http://clickhouse_backend/ping;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
    }

    # Main ClickHouse interface
    location / {
        proxy_pass http://clickhouse_backend/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts for long-running queries
        # Timeout cho truy vấn dài
        proxy_read_timeout 3600s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 3600s;
        
        # Buffer settings
        # Cấu hình buffer
        proxy_buffering off;
        proxy_request_buffering off;
        
        # Max body size for large inserts
        # Kích thước body tối đa cho insert lớn
        client_max_body_size 100M;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}

