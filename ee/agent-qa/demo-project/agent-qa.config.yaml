# ETUS Demo Project
workspace:
  testMatch:
    - tests/web/**/*.yaml
    - tests/mobile/**/*.yaml
    - tests/farm/**/*.yaml
  suiteMatch:
    - suites/**/*.suite.yaml
  hooksFile: hooks.yaml
  agentRules: ./agent-rules.md
  envFile: .env
  secretsFile: .env.secrets.local
services:
  cache:
    dir: .agent-qa/cache
    ttl: 7d
  accessibility:
    enabled: true
    standard: wcag2aa
    runAfter: every-step
    failOnViolation: false
  memory:
    dir: agent-qa-memory
registry:
  targets:
    wai-bad:
      platform: web
      url: https://www.w3.org/WAI/demos/bad/before/home.html
use:
  mobile:
    appState: preserve
