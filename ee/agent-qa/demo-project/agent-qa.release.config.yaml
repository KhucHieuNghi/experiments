workspace:
  testMatch:
    - release-action-pack/**/*.yaml
  suiteMatch:
    - release-action-pack/**/*.suite.yaml
  hooksFile: hooks.yaml
  agentRules: ./agent-rules.md
  envFile: .env
  secretsFile: .env.secrets.local
services:
  cache:
    dir: .agent-qa/cache
    ttl: 7d
  memory:
    dir: agent-qa-memory
use:
  mobile:
    appState: preserve
