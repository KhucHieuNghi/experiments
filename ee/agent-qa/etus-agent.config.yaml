# ETUS Configuration

# File discovery and project settings
workspace:
  testMatch:
    - tests/**/*.yaml
  suiteMatch:
    - suites/**/*.suite.yaml
  hooksFile: hooks.yaml
  agentRules: ./agent-rules.md
  envFile: .env
  secretsFile: .env.secrets.local

# Infrastructure services
services:
  dashboard:
    port: 3100
    artifactsDir: .etus-agent/artifacts
  mcp:
    enabled: true
    transport: http
    host: 127.0.0.1
    port: 3471
    path: /mcp
  cache:
    dir: .etus-agent/cache
    ttl: 7d
  authState:
    dir: .etus-agent/auth-states
  accessibility:
    enabled: true
    standard: wcag2aa
    runAfter: every-step
    failOnViolation: false
  recording:
    enabled: true
  memory:
    enabled: true
    provider: local
    dir: etus-agent-memory
  logging:
    level: warn

# Named resource definitions
registry:
  llms:
    - name: openrouter
      provider: openai-compatible
      model: anthropic/claude-sonnet-4
      baseURL: https://openrouter.ai/api/v1
  targets:
    op:
      platform: web
      product: op
      url: https://example.com

# Execution settings
use:
  browser:
    name: chromium
    headless: true
    viewport:
      width: 1280
      height: 720
  mobile:
    appState: preserve
  timeout:
    step: 5m
    test: 30m
    navigation: 1m
  healing:
    maxAttempts: 3
  planner:
    maxSubActions: 10
    previousStepCount: 5
  logCapture:
    console: true
    network: true
  parallel: false
  llm: openrouter
