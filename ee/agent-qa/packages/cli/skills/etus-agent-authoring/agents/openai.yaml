interface:
  display_name: "ETUS Authoring"
  short_description: "Author tests with real ETUS contracts"
  default_prompt: "Use $etus-agent-authoring to create and validate an ETUS test with canonical IDs."

dependencies:
  tools:
    - type: "mcp"
      value: "etus-agent"
      description: "ETUS local MCP server for schema, ID, authoring, and run tools."
      transport: "streamable_http"
      url: "http://127.0.0.1:3471/mcp"

policy:
  allow_implicit_invocation: true
